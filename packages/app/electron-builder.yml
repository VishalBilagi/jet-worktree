appId: com.jet.worktree
productName: Jet
artifactName: Jet-${version}-${arch}.${ext}

directories:
  output: dist

mac:
  category: public.app-category.developer-tools
  identity: "-"
  icon: build/icon.icns
  extendInfo:
    CFBundleIconName: AppIcon

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources/bin/
    to: bin/
    filter:
      - jet
  - from: resources/AppIcon.icon
    to: AppIcon.icon
