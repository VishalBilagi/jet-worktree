name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to rebuild, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  build-cli:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.8"

      - name: Install dependencies
        run: bun install

      - name: Build standalone CLI
        run: |
          mkdir -p release
          bun build packages/cli/src/index.ts \
            --compile \
            --target=bun-darwin-arm64 \
            --outfile release/jet

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-arm64
          path: release/jet

  build-app:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.8"

      - name: Install dependencies
        run: bun install

      - name: Bundle CLI for app
        run: |
          mkdir -p packages/app/resources/bin
          bun build packages/cli/src/index.ts \
            --compile \
            --target=bun-darwin-arm64 \
            --outfile packages/app/resources/bin/jet
          chmod +x packages/app/resources/bin/jet

      - name: Build app assets
        run: bun run --cwd packages/app build

      - name: Package macOS app
        run: bun run --cwd packages/app dist -- --mac zip dmg --arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64
          path: |
            packages/app/dist/Jet-*.dmg
            packages/app/dist/Jet-*.zip

  publish:
    needs:
      - build-cli
      - build-app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        id: github_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/jet
            release-artifacts/Jet-*.dmg
            release-artifacts/Jet-*.zip

      - name: Check out tap repository
        if: ${{ vars.HOMEBREW_TAP_REPOSITORY != '' && steps.github_release.outcome == 'success' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render Homebrew cask
        if: ${{ vars.HOMEBREW_TAP_REPOSITORY != '' && steps.github_release.outcome == 'success' }}
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          HOMEBREW_CASK_NAME: ${{ vars.HOMEBREW_CASK_NAME }}
        run: |
          tag_name="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${tag_name#v}"
          ./scripts/render-homebrew-cask.sh \
            "$version" \
            "release-artifacts/Jet-$version-arm64.zip" \
            "$GITHUB_WORKSPACE/homebrew-tap"

      - name: Create tap pull request
        if: ${{ vars.HOMEBREW_TAP_REPOSITORY != '' && steps.github_release.outcome == 'success' }}
        uses: peter-evans/create-pull-request@v7
        with:
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          branch: release/jet-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          commit-message: Update Jet Homebrew cask for ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          title: Update Jet Homebrew cask for ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body: |
            Automated update for Jet ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}.

            Includes:
            - `Casks/${{ vars.HOMEBREW_CASK_NAME || 'jet-worktree' }}.rb`
